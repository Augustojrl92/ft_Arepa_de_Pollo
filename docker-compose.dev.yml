services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trascendence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trascendence"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-backup:
    image: postgres:16-alpine
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: trascendence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_RETRY_SECONDS: ${BACKUP_RETRY_SECONDS:-300}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups/postgres:/backups/postgres
      - ./scripts/automated_backup_db.sh:/usr/local/bin/automated_backup_db.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/automated_backup_db.sh"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
